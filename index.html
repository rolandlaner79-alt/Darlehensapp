<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Darlehensvergleich</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#007aff">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 4px;
    background: #f2f2f7;
    color: #111;
  }

  h1, h2, h3 {
    margin: 2px 0;
    font-size: 1.05rem;
  }

  .section {
    background: #fff;
    border-radius: 8px;
    padding: 6px;
    margin-bottom: 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  label {
    display: block;
    margin-top: 3px;
    font-size: 0.78rem;
  }

input {
    width: 100%;
    padding: 5px;
    margin-top: 2px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px; /* verhindert Zoom auf iPhone */
    box-sizing: border-box;
}


  .kredit-container {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .kredit-box {
    background: #f9f9ff;
    border-radius: 6px;
    padding: 6px;
    border: 1px solid #ddd;
  }

  @media (min-width: 700px) {
    .kredit-container { flex-direction: row; }
  }

  button {
    width: 100%;
    padding: 7px;
    margin-top: 6px;
    border-radius: 8px;
    border: none;
    background: #007aff;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
  }

  #ergebnisse {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  @media (min-width: 700px) {
    #ergebnisse { flex-direction: row; }
  }

  .erg-box {
    flex: 1;
    background: #f9f9ff;
    border-radius: 6px;
    padding: 6px;
    border: 1px solid #ddd;
    font-size: 0.85rem;
  }

  #chartContainer {
    width: 100%;
    height: 180px;
    background: #fff;
    border-radius: 8px;
    padding: 4px;
    box-sizing: border-box;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  #chart {
    width: 100%;
    height: 100%;
    border-radius: 4px;
    background: #fafafa;
  }

  .hint {
    font-size: 0.7rem;
    color: #666;
    margin-top: 2px;
  }
</style>

</head>
<body>

  <div class="section">
    <h1>Darlehensvergleich</h1>
    <p class="hint">
      Gib pro Kredit entweder <b>Laufzeit</b> oder <b>Rate</b> an. Die fehlende Größe wird berechnet.
    </p>
  </div>

  <div class="section">
    <div class="kredit-container">
      <div class="kredit-box">
        <h2>Kredit A</h2>
        <label>Kreditsumme (€):
          <input id="kreditA" type="number" value="100000">
        </label>
        <label>Zinssatz p.a. (%):
          <input id="zinsA" type="number" step="0.01" value="3">
        </label>
        <label>Laufzeit (Monate) – leer lassen, wenn Rate bekannt:
          <input id="laufzeitA" type="number">
        </label>
        <label>Monatliche Rate (€) – leer lassen, wenn Laufzeit bekannt:
          <input id="rateA" type="number">
        </label>
      </div>

      <div class="kredit-box">
        <h2>Kredit B</h2>
        <label>Kreditsumme (€):
          <input id="kreditB" type="number" value="100000">
        </label>
        <label>Zinssatz p.a. (%):
          <input id="zinsB" type="number" step="0.01" value="3">
        </label>
        <label>Laufzeit (Monate) – leer lassen, wenn Rate bekannt:
          <input id="laufzeitB" type="number">
        </label>
        <label>Monatliche Rate (€) – leer lassen, wenn Laufzeit bekannt:
          <input id="rateB" type="number">
        </label>
      </div>
    </div>

    <button onclick="vergleichen()">Vergleichen</button>
  </div>

  <div class="section">
    <h2>Ergebnisse</h2>
    <div id="ergebnisse">
      <div id="ergA" class="erg-box"></div>
      <div id="ergB" class="erg-box"></div>
    </div>
  </div>

  <div class="section">
    <h2>Restschuldverlauf</h2>
    <div id="chartContainer">
      <canvas id="chart"></canvas>
    </div>
    <p class="hint">Die Kurven zeigen die Restschuld von Kredit A (blau) und Kredit B (rot) über die Monate.</p>
  </div>

 <script>
function berechneDarlehen(K, p, n, rateInput) {
  const i = p / 12 / 100;
  let rate;

  if (!p) return null;

  // FALL 1: Kreditsumme + Laufzeit => Rate
  if (K && n && !rateInput) {
    rate = K * (i / (1 - Math.pow(1 + i, -n)));
  }

  // FALL 2: Kreditsumme + Rate => Laufzeit
  else if (K && rateInput && !n) {
    rate = rateInput;

    if (rate <= K * i) return null;

    n = Math.log(rate / (rate - K * i)) / Math.log(1 + i);
    n = Math.ceil(n);
  }

  // FALL 3: Rate + Laufzeit => Kreditsumme
  else if (!K && rateInput && n) {
    rate = rateInput;
    K = rate * ((1 - Math.pow(1 + i, -n)) / i);
  }

  else {
    return null;
  }

  let rest = K;
  let gesamtZinsen = 0;
  const restschuldVerlauf = [];

  for (let m = 1; m <= n; m++) {
    const zins = rest * i;
    const tilgung = rate - zins;

    rest -= tilgung;
    gesamtZinsen += zins;

    restschuldVerlauf.push(rest > 0 ? rest : 0);

    if (rest <= 0) break;
  }

  const laufzeit = restschuldVerlauf.length;
  const gesamtrueckzahlung = rate * laufzeit;
  const zinsProzent = (gesamtZinsen / K) * 100;

  return {
    K,
    rate,
    n: laufzeit,
    gesamtZinsen,
    gesamtrueckzahlung,
    zinsProzent,
    restschuldVerlauf
  };
}

function formatEuro(x) {
  return x.toLocaleString('de-DE', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function formatProzent(x) {
  return x.toLocaleString('de-DE', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function vergleichen() {
  const A = berechneDarlehen(
    parseFloat(document.getElementById('kreditA').value),
    parseFloat(document.getElementById('zinsA').value),
    parseInt(document.getElementById('laufzeitA').value),
    parseFloat(document.getElementById('rateA').value)
  );

  const B = berechneDarlehen(
    parseFloat(document.getElementById('kreditB').value),
    parseFloat(document.getElementById('zinsB').value),
    parseInt(document.getElementById('laufzeitB').value),
    parseFloat(document.getElementById('rateB').value)
  );

  const ergA = document.getElementById('ergA');
  const ergB = document.getElementById('ergB');

  if (!A) {
    ergA.innerHTML = "<b>Ungültige Eingaben für Kredit A.</b>";
  } else {
    ergA.innerHTML = `
      <h3>Kredit A</h3>
      Kreditsumme: <b>${formatEuro(A.K)} €</b><br>
      Monatliche Rate: <b>${formatEuro(A.rate)} €</b><br>
      Laufzeit: <b>${A.n} Monate</b><br>
      Gesamtzinsen: <b>${formatEuro(A.gesamtZinsen)} €</b><br>
      Gesamtrückzahlung: <b>${formatEuro(A.gesamtrueckzahlung)} €</b><br>
      Zinsanteil: <b>${formatProzent(A.zinsProzent)} %</b><br>
    `;
  }

  if (!B) {
    ergB.innerHTML = "<b>Ungültige Eingaben für Kredit B.</b>";
  } else {
    ergB.innerHTML = `
      <h3>Kredit B</h3>
      Kreditsumme: <b>${formatEuro(B.K)} €</b><br>
      Monatliche Rate: <b>${formatEuro(B.rate)} €</b><br>
      Laufzeit: <b>${B.n} Monate</b><br>
      Gesamtzinsen: <b>${formatEuro(B.gesamtZinsen)} €</b><br>
      Gesamtrückzahlung: <b>${formatEuro(B.gesamtrueckzahlung)} €</b><br>
      Zinsanteil: <b>${formatProzent(B.zinsProzent)} %</b><br>
    `;
  }

  zeichneChart(A, B);
}

function zeichneChart(A, B) {
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();

  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, rect.width, rect.height);

  ctx.fillStyle = '#f0f0f0';
  ctx.fillRect(0, 0, rect.width, rect.height);

  const paddingLeft = 40;
  const paddingRight = 15;
  const paddingTop = 15;
  const paddingBottom = 30;

  const plotWidth = rect.width - paddingLeft - paddingRight;
  const plotHeight = rect.height - paddingTop - paddingBottom;

  let maxRest = 0;
  let maxMonate = 0;

  if (A && A.restschuldVerlauf.length) {
    maxRest = Math.max(maxRest, ...A.restschuldVerlauf);
    maxMonate = Math.max(maxMonate, A.restschuldVerlauf.length);
  }

  if (B && B.restschuldVerlauf.length) {
    maxRest = Math.max(maxRest, ...B.restschuldVerlauf);
    maxMonate = Math.max(maxMonate, B.restschuldVerlauf.length);
  }

  if (maxRest === 0) return;

  function xPos(i) {
    return paddingLeft + (i / (maxMonate - 1)) * plotWidth;
  }

  function yPos(rest) {
    return paddingTop + plotHeight - (rest / maxRest) * plotHeight;
  }

  // Achsen
  ctx.strokeStyle = "#ccc";
  ctx.lineWidth = 1;

  ctx.beginPath();
  ctx.moveTo(paddingLeft, paddingTop);
  ctx.lineTo(paddingLeft, paddingTop + plotHeight);
  ctx.lineTo(paddingLeft + plotWidth, paddingTop + plotHeight);
  ctx.stroke();

  // Texte
  ctx.fillStyle = "#666";
  ctx.font = "11px sans-serif";

  ctx.fillText("0 €", 5, paddingTop + plotHeight);
  ctx.fillText(formatEuro(maxRest) + " €", 5, paddingTop + 10);

  ctx.textAlign = "center";
  ctx.fillText("Monate", paddingLeft + plotWidth / 2, rect.height - 5);
  ctx.textAlign = "left";

  // Kredit A
  if (A) {
    ctx.strokeStyle = "#007aff";
    ctx.lineWidth = 2;
    ctx.beginPath();

    A.restschuldVerlauf.forEach((rest, i) => {
      const x = xPos(i);
      const y = yPos(rest);

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });

    ctx.stroke();
  }

  // Kredit B
  if (B) {
    ctx.strokeStyle = "#ff3b30";
    ctx.lineWidth = 2;
    ctx.beginPath();

    B.restschuldVerlauf.forEach((rest, i) => {
      const x = xPos(i);
      const y = yPos(rest);

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });

    ctx.stroke();
  }

  // Legende
  ctx.fillStyle = "#007aff";
  ctx.fillText("A", paddingLeft + 10, paddingTop + 15);

  ctx.fillStyle = "#ff3b30";
  ctx.fillText("B", paddingLeft + 25, paddingTop + 15);
}
