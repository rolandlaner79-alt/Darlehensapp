<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Darlehensvergleich Pro</title>

<style>
:root{
  --blue:#007aff;
  --red:#ff3b30;
  --bg:#f2f2f7;
  --card:#ffffff;
  --text:#111;
  --sub:#666;
  --line:#d8d8dc;
}

*{box-sizing:border-box;}

body{
  margin:0;
  padding:8px;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

h1,h2,h3{margin:0 0 6px 0;}

.section{
  background:var(--card);
  border-radius:12px;
  padding:10px;
  margin-bottom:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}

.hint{
  font-size:.78rem;
  color:var(--sub);
  margin:0;
}

.grid{
  display:grid;
  gap:8px;
}

@media(min-width:800px){
  .grid-2{
    grid-template-columns:1fr 1fr;
  }
}

.box{
  background:#f9f9ff;
  border:1px solid #e2e2e8;
  border-radius:10px;
  padding:8px;
}

label{
  display:block;
  font-size:.82rem;
  margin-top:6px;
}

input{
  width:100%;
  margin-top:3px;
  padding:7px;
  border:1px solid #cfcfd5;
  border-radius:8px;
  font-size:16px;
}

button{
  width:100%;
  margin-top:10px;
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:1rem;
  font-weight:700;
  color:#fff;
  background:var(--blue);
}

.results{
  display:grid;
  gap:8px;
}

@media(min-width:800px){
  .results{
    grid-template-columns:1fr 1fr;
  }
}

.result{
  background:#f9f9ff;
  border:1px solid #e2e2e8;
  border-radius:10px;
  padding:8px;
  font-size:.9rem;
  line-height:1.45;
}

.good{
  margin-top:8px;
  padding:8px;
  border-radius:10px;
  font-size:.9rem;
  background:#eef8ee;
  border:1px solid #cde8cd;
}

#chartWrap{
  height:260px;
  background:#fff;
  border-radius:12px;
}

canvas{
  width:100%;
  height:100%;
  display:block;
}
</style>
</head>

<body>

<div class="section">
  <h1>Darlehensvergleich Pro</h1>
  <p class="hint">
    Gib je Kredit zwei Werte ein: Kreditsumme / Rate / Laufzeit.
    Der fehlende Wert wird automatisch berechnet.
  </p>
</div>

<div class="section">
  <div class="grid grid-2">

    <div class="box">
      <h2>Kredit A</h2>

      <label>Kreditsumme (€)
       <input id="kreditA" type="number" oninput="vergleichen()">
      </label>

      <label>Zins p.a. (%)
        <input id="zinsA" type="number" step="0.01" oninput="vergleichen()">
      </label>

      <label>Laufzeit (Monate)
        <input id="laufzeitA" type="number" oninput="vergleichen()">
      </label>

      <label>Monatliche Rate (€)
        <input id="rateA" type="number" oninput="vergleichen()">
      </label>
    </div>

    <div class="box">
      <h2>Kredit B</h2>

      <label>Kreditsumme (€)
        <input id="kreditB" type="number" oninput="vergleichen()">
      </label>

      <label>Zins p.a. (%)
       <input id="zinsB" type="number" step="0.01" oninput="vergleichen()">
      </label>

      <label>Laufzeit (Monate)
        <input id="laufzeitB" type="number" oninput="vergleichen()">
      </label>

      <label>Monatliche Rate (€)
        <input id="rateB" type="number" oninput="vergleichen()">
      </label>
    </div>

  </div>

  <button onclick="vergleichen()">Vergleichen</button>
</div>

<div class="section">
  <h2>Ergebnisse</h2>

  <div class="results">
    <div id="ergA" class="result"></div>
    <div id="ergB" class="result"></div>
  </div>

  <div id="winner"></div>
</div>

<div class="section">
  <h2>Restschuldverlauf</h2>
  <div id="chartWrap">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
function euro(x){
  return x.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2});
}

function pct(x){
  return x.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2});
}

function num(id){
  return parseFloat(document.getElementById(id).value);
}

function intv(id){
  return parseInt(document.getElementById(id).value);
}

/* -------------------------
   Kreditberechnung
-------------------------- */
function calcLoan(K,p,n,rateInput){
  const i = p/12/100;

  /* 0%-Zins Sonderfall */
  if(p === 0){
    if(K && n && !rateInput){
      const rate = K/n;
      return buildLoan(K,rate,n,0);
    }
    if(K && rateInput && !n){
      const n2 = Math.ceil(K/rateInput);
      return buildLoan(K,rateInput,n2,0);
    }
    if(!K && n && rateInput){
      const K2 = rateInput*n;
      return buildLoan(K2,rateInput,n,0);
    }
    return null;
  }

  /* Normalfall */
  let rate;

  if(K && n && !rateInput){
    rate = K * (i/(1-Math.pow(1+i,-n)));
  }
  else if(K && rateInput && !n){
    rate = rateInput;
    if(rate <= K*i) return null;
    n = Math.ceil(Math.log(rate/(rate-K*i))/Math.log(1+i));
  }
  else if(!K && n && rateInput){
    rate = rateInput;
    K = rate*((1-Math.pow(1+i,-n))/i);
  }
  else{
    return null;
  }

  return amortize(K,rate,n,i);
}

function amortize(K,rate,n,i){
  let rest = K;
  let zinsen = 0;
  let arr = [];

  for(let m=1;m<=n;m++){
    const z = rest*i;
    const t = rate-z;
    rest -= t;
    zinsen += z;
    arr.push(rest>0?rest:0);
    if(rest<=0) break;
  }

  return buildLoan(K,rate,arr.length,zinsen,arr);
}

function buildLoan(K,rate,n,zinsen,verlauf){
  const gesamt = rate*n;
  return{
    K,
    rate,
    n,
    zinsen,
    gesamt,
    zinsQuote: K>0 ? (zinsen/K)*100 : 0,
    verlauf: verlauf || Array.from({length:n},(_,i)=>K - rate*(i+1))
  };
}

/* -------------------------
   Rendering
-------------------------- */
function render(id,title,d){
  if(!d){
    document.getElementById(id).innerHTML="<b>Ungültige Eingaben</b>";
    return;
  }

  document.getElementById(id).innerHTML=`
    <h3>${title}</h3>
    Kreditsumme: <b>${euro(d.K)} €</b><br>
    Rate: <b>${euro(d.rate)} €</b><br>
    Laufzeit: <b>${d.n} Monate</b><br>
    Gesamtzinsen: <b>${euro(d.zinsen)} €</b><br>
    Gesamtrückzahlung: <b>${euro(d.gesamt)} €</b><br>
    Zinsanteil: <b>${pct(d.zinsQuote)} %</b>
  `;
}

function compare(A,B){
  const w = document.getElementById("winner");

  if(!A || !B){
    w.innerHTML="";
    return;
  }

  let txt = "";

  if(A.zinsen < B.zinsen){
    txt += "🏆 Kredit A hat niedrigere Gesamtzinsen.<br>";
  }else if(B.zinsen < A.zinsen){
    txt += "🏆 Kredit B hat niedrigere Gesamtzinsen.<br>";
  }

  if(A.n < B.n){
    txt += "⚡ Kredit A ist schneller abbezahlt.";
  }else if(B.n < A.n){
    txt += "⚡ Kredit B ist schneller abbezahlt.";
  }

  w.innerHTML = `<div class="good">${txt}</div>`;
}

/* -------------------------
   Hauptfunktion
-------------------------- */
function vergleichen(){
  const A = calcLoan(num("kreditA"),num("zinsA"),intv("laufzeitA"),num("rateA"));
  const B = calcLoan(num("kreditB"),num("zinsB"),intv("laufzeitB"),num("rateB"));

  render("ergA","Kredit A",A);
  render("ergB","Kredit B",B);
  compare(A,B);
  chart(A,B);
}

/* -------------------------
   Chart
-------------------------- */
function chart(A,B){
  const c = document.getElementById("chart");
  const ctx = c.getContext("2d");

  const r = c.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  c.width = r.width * dpr;
  c.height = r.height * dpr;

  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,r.width,r.height);

  const left = 52;
  const top = 18;
  const right = 18;
  const bottom = 34;

  const w = r.width - left - right;
  const h = r.height - top - bottom;

  let maxRest = 0;
  let maxMonate = 0;

  [A,B].forEach(d=>{
    if(d){
      maxRest = Math.max(maxRest,...d.verlauf);
      maxMonate = Math.max(maxMonate,d.verlauf.length);
    }
  });

  if(maxRest <= 0) return;

  function x(i){
    if(maxMonate <= 1) return left;
    return left + (i/(maxMonate-1))*w;
  }

  function y(v){
    return top + h - (v/maxRest)*h;
  }

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,r.width,r.height);

  ctx.strokeStyle = "#ececf1";
  ctx.lineWidth = 1;

  for(let i=0;i<=5;i++){
    const gy = top + (h/5)*i;
    ctx.beginPath();
    ctx.moveTo(left,gy);
    ctx.lineTo(left+w,gy);
    ctx.stroke();
  }

  for(let i=0;i<=4;i++){
    const gx = left + (w/4)*i;
    ctx.beginPath();
    ctx.moveTo(gx,top);
    ctx.lineTo(gx,top+h);
    ctx.stroke();
  }

  ctx.strokeStyle = "#bfc3ca";
  ctx.lineWidth = 1.2;

  ctx.beginPath();
  ctx.moveTo(left,top);
  ctx.lineTo(left,top+h);
  ctx.lineTo(left+w,top+h);
  ctx.stroke();

  ctx.fillStyle = "#666";
  ctx.font = "11px sans-serif";

  for(let i=0;i<=5;i++){
    const val = maxRest - (maxRest/5)*i;
    const gy = top + (h/5)*i + 4;
    ctx.fillText(val.toLocaleString("de-DE",{maximumFractionDigits:0}) + "€",2,gy);
  }

  ctx.textAlign = "center";

  for(let i=0;i<=4;i++){
    const monat = Math.round((maxMonate/4)*i);
    const gx = left + (w/4)*i;
    ctx.fillText(monat,gx,r.height-8);
  }

  ctx.textAlign = "left";

  draw(A,"#007aff");
  draw(B,"#ff3b30");

  function draw(d,color){
    if(!d) return;

    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.beginPath();

    d.verlauf.forEach((v,i)=>{
      const px = x(i);
      const py = y(v);

      if(i===0) ctx.moveTo(px,py);
      else ctx.lineTo(px,py);
    });

    ctx.stroke();
  }

  ctx.fillStyle = "#007aff";
  ctx.fillRect(left+8,top+6,10,10);
  ctx.fillStyle = "#222";
  ctx.fillText("Kredit A",left+24,top+15);

  ctx.fillStyle = "#ff3b30";
  ctx.fillRect(left+95,top+6,10,10);
  ctx.fillStyle = "#222";
  ctx.fillText("Kredit B",left+111,top+15);

  ctx.fillStyle = "#666";
  ctx.textAlign = "center";
  ctx.fillText("Monate",left+w/2,r.height-20);
}
</script>

</body>
</html>
